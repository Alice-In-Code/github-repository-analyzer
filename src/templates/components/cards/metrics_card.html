<article class="dashboard-card metrics-card">


    <header class="card-header">

        <h3>
            Repository Metrics
        </h3>

    </header>


    <div class="card-body metrics-grid">


        <div class="metric">

            <span>
                Stars
            </span>

            <strong>

                {{ repository.stargazers_count }}

            </strong>

        </div>


        <div class="metric">

            <span>
                Watchers
            </span>

            <strong>
                {{ repository.subscribers_count }}
            </strong>

        </div>


        <div class="metric">

            <span>
                Forks
            </span>

            <strong>
                {{ repository.forks_count }}
            </strong>

        </div>



        <div class="metric">

            <span>
                Repository Size
            </span>

            <strong>
                {{ "N/A" if repository_size.unit == "N/A" else repository_size.value ~ " " ~ repository_size.unit }}
            </strong>

        </div>



    </div>


</article>
