{% extends "base.html" %}

{% block title %}
    GitHub Repository Analyzer
{% endblock %}

{% block content %}

<h1>GitHub Repository Analyzer</h1>

<p>
    Enter a GitHub repository in the format:
    <strong>owner/repository</strong>
</p>

<form action="/analyze" method="POST">
    <input
            type="text"
            name="repository"
            placeholder="owner/repository"
            required
    >

    <button type="submit">
        Analyze Repository
    </button>
</form>

{% endblock %}
