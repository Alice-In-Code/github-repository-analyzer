{% extends "base.html" %}


{% block title %}

GitHub Repository Analyzer

{% endblock %}


{% block css %}

<link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/home.css') }}"
>

{% endblock %}


{% block content %}

<div class="home-page">

    <div class="home-content">

        <h1>
            GitHub Repository Analyzer
        </h1>

        <!-- Repository search bar -->
        <form
                action="/analyze"
                method="POST"
                class="search-form"
        >

            <input
                    type="text"
                    name="repository"
                    placeholder="owner/repository"
                    required
            >

        </form>

        <p>
            View repository metrics, health, and insights.
        </p>

    </div>

</div>

{% endblock %}


{% block javascript %}

<script
        src="{{ url_for('static', filename='js/home.js') }}"
>
</script>

{% endblock %}
